<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora </h1>

        <div class="calculator">
            <div class="btn-all">
                <div>
                    <div id="output" class="output-result">2</output>
                </div>
    
                <div class="btn-num">
                    <div>
                        <button class="btn-value">1</button>
                        <button class="btn-value">2</button>
                        <button class="btn-value">3</button>
                        <button class="btn-division">/</button>
                    </div>
        
                    <div>
                        <button class="btn-value">4</button>
                        <button class="btn-value">5</button>
                        <button class="btn-value">6</button>
                        <button class="btn-multiply">*</button>
                    </div>
        
                    <div>
                        <button class="btn-value">7</button>
                        <button class="btn-value">8</button>
                        <button class="btn-value">9</button>
                        <button class="btn-subtract">-</button>
                    </div>

                    <div>
                        <button class="btn-clear">Cl</button>
                        <button class="btn-value">0</button>
                        <button class="btn-result">=</button>
                        <button class="btn-add">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
